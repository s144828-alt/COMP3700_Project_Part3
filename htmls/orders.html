    <div class="container">
        <div class="calc-card">
            <h2 class="text-center mb-4" style="color: #512d6d;">
                <i class="bi bi-calculator-fill"></i> Order Calculator
            </h2>
            <p class="text-muted text-center">Select a service and quantity to see the total price</p>
            
            <div class="mb-4">
                <label class="form-label fw-bold">Select Service:</label>
                <select id="serviceSelect" class="form-select form-select-lg">
                    <option value="0" selected>-- Choose a Service --</option>
                    <option value="2.500">Student Meal Plan (2.500 OMR)</option>
                    <option value="5.000">First Aid Kit (5.000 OMR)</option>
                    <option value="15.000">Engineering Textbook (15.000 OMR)</option>
                    <option value="1.200">Coffee & Snacks (1.200 OMR)</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Quantity:</label>
                <div class="input-group input-group-lg">
                    <span class="input-group-text"><i class="bi bi-cart-plus"></i></span>
                    <input type="number" id="quantityInput" class="form-control" value="1" min="1">
                </div>
            </div>

            <button onclick="calculateOrder()" class="btn btn-lg w-100 fw-bold" style="background-color: #512d6d; color: white;">
                Calculate Total
            </button>

            <div id="resultBox" class="total-box" style="display: none;">
                <h5 class="mb-1">Total Amount</h5>
                <h2 id="totalAmount" class="mb-0">0.000 OMR</h2>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // دالة الحساب
        function calculateOrder() {
            let price = document.getElementById("serviceSelect").value;
            let qty = document.getElementById("quantityInput").value;
            
            if (price > 0 && qty > 0) {
                let total = price * qty;
                document.getElementById("totalAmount").innerText = total.toFixed(3) + " OMR";
                document.getElementById("resultBox").style.display = "block";
            } else {
                alert("Please select a service and quantity!");
            }
        }
    </script>
